<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flozer.PRO — Новая арена лепестков</title>
    <style>
        /* Убираем отступы и скроллбары, чтобы игра была на весь экран */
        body, html {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #141414;
            font-family: sans-serif;
        }
        canvas {
            display: block;
        }
        /* Стильный интерфейс для очков поверх игры */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #ffffff;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none; /* Чтобы мышка кликала сквозь текст */
        }
        /* Красивый счетчик очков */
        #score { 
            margin: 0; 
            font-size: 28px; 
            color: #4ade80; 
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div id="score">Очки: 0</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
